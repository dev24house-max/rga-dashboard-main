http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    large_client_header_buffers 8 32k;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Ensure correct MIME types for all files
        include /etc/nginx/mime.types;

        # Fallback for JS/MJS if not in mime.types
        types {
            application/javascript js;
            application/javascript mjs;
        }

        # Frontend SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Specifically handle assets
        location /assets/ {
            include /etc/nginx/mime.types;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # JS MIME type
        location ~* \.js$ {
            types {
                application/javascript js;
            }
            default_type application/javascript;
        }

        # API
        location /api {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;
        }

        # OAuth
        location /auth {
            proxy_pass http://backend:3000;

            proxy_http_version 1.1;

            # Avoid sending potentially large browser cookies to the upstream
            # for the OAuth endpoints. Some providers (or many third-party
            # cookies) can cause request headers to grow past server limits
            # and result in HTTP 431 responses. Clearing the Cookie header
            # for these endpoints prevents oversized headers while the
            # backend can still validate OAuth state via query params.
            proxy_set_header Cookie "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health
        location /health {
            proxy_pass http://backend:3000;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}